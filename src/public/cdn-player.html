<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RU CDN Dashboard - StremiRow</title>
  <link rel="stylesheet" href="admin-base.css">
  <link rel="stylesheet" href="admin-forms.css">
  <style>
    :root {
      --sidebar-width: 320px;
    }
    body {
      display: flex;
      height: 100vh;
      width: 100vw;
      margin: 0;
      overflow: hidden;
      background: var(--color-bg-main);
      color: var(--color-text-main);
      font-family: var(--font-main);
    }
    .sidebar {
      width: var(--sidebar-width);
      height: 100vh;
      border-right: 1px solid var(--color-border-main);
      background: var(--color-bg-surface);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--color-border-main);
    }
    .sidebar-header h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
    }
    .filter-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .channel-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 4px;
      border: 1px solid transparent;
    }
    .channel-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .channel-item.active {
      background: var(--color-primary-dim);
      border-color: var(--color-primary);
    }
    .channel-item img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      background: #000;
      border-radius: 4px;
    }
    .channel-info {
        flex: 1;
        min-width: 0;
    }
    .channel-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .channel-meta {
      font-size: 11px;
      color: var(--color-text-disabled);
      display: flex;
      gap: 8px;
    }
    .main-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
    }
    .view-header {
      padding: 10px 20px;
      background: var(--color-bg-surface);
      border-bottom: 1px solid var(--color-border-main);
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 50px;
    }
    .iframe-container {
      flex: 1;
      position: relative;
    }
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }
    .status-badge {
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 10px;
        text-transform: uppercase;
        font-weight: bold;
    }
    .status-online { background: rgba(0, 200, 81, 0.2); color: #00c851; }
    .status-offline { background: rgba(255, 68, 68, 0.2); color: #ff4444; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border-main); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-text-disabled); }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>RU CDN Dashboard</h1>
      <div class="filter-controls">
        <label style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: #00c851; border: 1px solid rgba(0, 200, 81, 0.3); padding: 6px; border-radius: 4px; pointer-events: none; opacity: 0.8; margin-bottom: 8px;">
          🛡️ Ad Blocking Active (Proxy Cleaned)
        </label>
        <input type="text" id="search" class="form-control" placeholder="Search channels...">
        <select id="country-filter" class="form-control">
          <option value="all">All Countries</option>
          <option value="ru" selected>Russia (RU)</option>
          <option value="nz">New Zealand (NZ)</option>
          <option value="gb">United Kingdom (GB)</option>
          <option value="us">United States (US)</option>
        </select>
      </div>
    </div>
    <div id="channel-list" class="channel-list">
      <div style="padding: 20px; text-align: center; color: var(--color-text-disabled);">Loading channels...</div>
    </div>
  </div>

  <div class="main-view">
    <div class="view-header">
      <div id="active-title">Select a channel to play</div>
      <div id="active-meta" style="font-size:12px; color:var(--color-text-disabled);"></div>
    </div>
    <div class="iframe-container">
      <iframe id="player-frame" name="player-frame" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>
  </div>

  <script>
    const API_URL = 'https://api.cdn-live.tv/api/v1/channels/?user=cdnlivetv&plan=free';
    let allChannels = [];
    const listEl = document.getElementById('channel-list');
    const searchEl = document.getElementById('search');
    const filterEl = document.getElementById('country-filter');
    const playerFrame = document.getElementById('player-frame');
    const activeTitle = document.getElementById('active-title');
    let currentChannel = null;

    async function loadChannels() {
      try {
        const resp = await fetch(API_URL);
        const data = await resp.json();
        allChannels = data.channels || [];
        renderList();
        
        // Auto-play first available RU channel if nothing selected
        const defaultChannel = allChannels.find(c => c.code === 'ru' && c.status === 'online');
        if (defaultChannel) selectChannel(defaultChannel);
      } catch (e) {
        listEl.innerHTML = `<div style="color:#ff4444; padding:20px;">Failed to load: ${e.message}</div>`;
      }
    }

    function renderList() {
      const query = searchEl.value.toLowerCase();
      const country = filterEl.value;
      const filtered = allChannels.filter(c => {
        if (country !== 'all' && c.code !== country) return false;
        if (query && !c.name.toLowerCase().includes(query)) return false;
        return true;
      });

      if (filtered.length === 0) {
        listEl.innerHTML = '<div style="padding:20px; color:var(--color-text-disabled);">No channels found</div>';
        return;
      }

      listEl.innerHTML = '';
      filtered.forEach(ch => {
        const item = document.createElement('div');
        item.className = 'channel-item';
        item.innerHTML = `
          <img src="${ch.image}" onerror="this.src='https://placehold.co/60x60?text=TV'">
          <div class="channel-info">
            <div class="channel-name">${ch.name}</div>
            <div class="channel-meta">
              <span>${ch.code.toUpperCase()}</span>
              <span class="status-badge ${ch.status === 'online' ? 'status-online' : 'status-offline'}">${ch.status}</span>
            </div>
          </div>
        `;
        item.onclick = () => selectChannel(ch, item);
        listEl.appendChild(item);
      });
    }

    function selectChannel(ch, element) {
      currentChannel = ch;
      document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
      if (element) element.classList.add('active');
      
      activeTitle.textContent = `${ch.name} [${ch.code.toUpperCase()}]`;
      
      // Use the clean proxy to load the player WITHOUT ads or embedding restrictions
      const proxiedUrl = `${window.location.origin}/cdn-proxy?url=${encodeURIComponent(ch.url)}`;
      playerFrame.src = proxiedUrl;
    }

    searchEl.oninput = renderList;
    filterEl.onchange = renderList;

    loadChannels();
  </script>
</body>
</html>
